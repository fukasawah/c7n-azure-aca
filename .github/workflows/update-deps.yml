name: Update Dependencies

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Update c7n packages
        run: uv lock --upgrade-package c7n --upgrade-package c7n-azure

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet uv.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get c7n-azure version
        if: steps.diff.outputs.changed == 'true'
        id: version
        run: |
          version=$(uv pip show c7n-azure 2>/dev/null | grep Version | awk '{print $2}' || echo "unknown")
          echo "c7n_azure_version=$version" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore: update c7n dependencies"
          title: "chore: update c7n-azure to ${{ steps.version.outputs.c7n_azure_version }}"
          body: |
            Automated dependency update for Cloud Custodian packages.
            - c7n-azure: ${{ steps.version.outputs.c7n_azure_version }}
          branch: deps/update-c7n
          delete-branch: true
